name: Upload new files to Snowflake

on:
  push:
    paths:
      - "data/**"

jobs:
  upload-to-snowflake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs

      - name: Configure Snowflake CLI connection
        run: |
          mkdir -p ~/.snowflake
          cat <<EOF > ~/.snowflake/config.toml
          [connections.default]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          database = "${{ secrets.SNOWFLAKE_DATABASE }}"
          schema = "${{ secrets.SNOWFLAKE_SCHEMA }}"
          EOF
          chmod 600 ~/.snowflake/config.toml
      
      - name: Subir archivos y debug Snowflake
        run: |
          BEFORE=${{ github.event.before }}
          AFTER=${{ github.event.after }}
      
          echo "Comparando commits:"
          echo "BEFORE: $BEFORE"
          echo "AFTER:  $AFTER"
      
          FILES=$(git diff --name-only "$BEFORE" "$AFTER" | grep "^data/" || true)
      
          echo "Archivos detectados:"
          echo "$FILES"
      
          if [ -z "$FILES" ]; then
            echo "No hay archivos nuevos o modificados en data/"
            exit 0
          fi
      
          echo "🔎 Contexto actual en Snowflake:"
          snow sql -q "
            SELECT 
              CURRENT_ACCOUNT(),
              CURRENT_USER(),
              CURRENT_ROLE(),
              CURRENT_DATABASE(),
              CURRENT_SCHEMA(),
              CURRENT_WAREHOUSE();
          "
      
          echo "🔎 Buscando el stage:"
          snow sql -q "
            SHOW STAGES LIKE 'MY_INTERNAL_STAGE';
          "
      
          echo "🔎 Listando contenido del stage (nombre simple):"
          snow sql -q "
            LIST @my_internal_stage;
          "
      
          echo "🔎 Listando contenido del stage (ruta completa):"
          snow sql -q "
            LIST @${{ secrets.SNOWFLAKE_DATABASE }}.${{ secrets.SNOWFLAKE_SCHEMA }}.MY_INTERNAL_STAGE;
          "
      
          for file in $FILES; do
            echo "Subiendo archivo: $file"
            snow sql -q "
              PUT file://$file @${{ secrets.SNOWFLAKE_DATABASE }}.${{ secrets.SNOWFLAKE_SCHEMA }}.MY_INTERNAL_STAGE AUTO_COMPRESS=TRUE
            "
          done
      
          echo "📦 Contenido final del stage:"
          snow sql -q "
            LIST @${{ secrets.SNOWFLAKE_DATABASE }}.${{ secrets.SNOWFLAKE_SCHEMA }}.MY_INTERNAL_STAGE;
          "
