name: Upload new files to Snowflake

on:
  push:
    paths:
      - "data/**"   # Solo se ejecuta si cambian archivos dentro de /data

jobs:
  upload-to-snowflake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install SnowSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y snowsql

      - name: Configure SnowSQL connection
        run: |
          mkdir -p ~/.snowsql
          cat <<EOF > ~/.snowsql/config
          [connections.default]
          accountname = ${{ secrets.SNOWFLAKE_ACCOUNT }}
          username = ${{ secrets.SNOWFLAKE_USER }}
          password = ${{ secrets.SNOWFLAKE_PASSWORD }}
          warehousename = ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          dbname = ${{ secrets.SNOWFLAKE_DATABASE }}
          schemaname = ${{ secrets.SNOWFLAKE_SCHEMA }}
          role = ${{ secrets.SNOWFLAKE_ROLE }}
          EOF

      - name: Upload new files to internal stage
        run: |
          for file in $(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep "^data/"); do
            echo "Subiendo archivo: $file"
            snowsql -c default -q "PUT file://$file @my_internal_stage AUTO_COMPRESS=TRUE"
          done

      - name: Load files into RAW table
        run: |
          snowsql -c default -q "
            COPY INTO RAW.landing_table
            FROM @my_internal_stage
            FILE_FORMAT = (TYPE = 'CSV')
            PATTERN='.*\.csv'
            ON_ERROR='CONTINUE'; 
            "
