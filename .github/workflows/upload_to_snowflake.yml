name: Upload new files to Snowflake

on:
  push:
    paths:
      - "data/**"

jobs:
  upload-to-snowflake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs

      - name: Configure Snowflake CLI connection
        run: |
          mkdir -p ~/.snowflake
          cat <<EOF > ~/.snowflake/config.toml
          [connections.default]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          database = "${{ secrets.SNOWFLAKE_DATABASE }}"
          schema = "${{ secrets.SNOWFLAKE_SCHEMA }}"
          EOF
          chmod 600 ~/.snowflake/config.toml

      
      - name: Upload new files to internal stage
        run: |
          for file in $(jq -r '.commits[].modified[], .commits[].added[]' <<< '${{ toJson(github.event) }}' | grep "^data/"); do
            echo "Subiendo archivo: $file"
            snow file put "$file" @my_internal_stage --auto-compress
          done

